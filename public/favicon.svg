<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Sun Rays - 12 perfect rays -->
  <g fill="url(#sunGradient)" filter="url(#glow)">
    <!-- Top Ray -->
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(0 512 512)"/>
    <!-- Rays at 30° intervals -->
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(30 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(60 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(90 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(120 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(150 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(180 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(210 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(240 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(270 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(300 512 512)"/>
    <path d="M512 50 L540 280 L484 280 Z" transform="rotate(330 512 512)"/>
  </g>

  <!-- Secondary Layer - Shorter Rays Between Main Rays -->
  <g fill="#FFB347" opacity="0.85">
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(15 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(45 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(75 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(105 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(135 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(165 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(195 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(225 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(255 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(285 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(315 512 512)"/>
    <path d="M512 140 L530 300 L494 300 Z" transform="rotate(345 512 512)"/>
  </g>

  <!-- Outer Ring -->
  <circle cx="512" cy="512" r="240" fill="url(#sunGradient)" opacity="0.95"/>

  <!-- Middle Ring with Detail -->
  <circle cx="512" cy="512" r="210" fill="url(#sunCore)"/>

  <!-- Inner Decorative Ring -->
  <circle cx="512" cy="512" r="185" fill="none" stroke="#FFF8DC" stroke-width="3" opacity="0.6"/>

  <!-- Core Circle - Bright Center -->
  <circle cx="512" cy="512" r="170" fill="url(#sunCore)"/>

  <!-- Inner Glow Effect -->
  <circle cx="512" cy="512" r="150" fill="#FFF8DC" opacity="0.7"/>

  <!-- Absolute Core - Pure Light -->
  <circle cx="512" cy="512" r="120" fill="#FFFACD"/>

  <!-- Center Detail Pattern - Concentric -->
  <circle cx="512" cy="512" r="100" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="512" r="80" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="512" r="60" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>

  <!-- Energy Waves - Subtle Details -->
  <g opacity="0.3">
    <circle cx="512" cy="512" r="140" fill="none" stroke="#FFA500" stroke-width="1.5"/>
    <circle cx="512" cy="512" r="160" fill="none" stroke="#FFA500" stroke-width="1.5"/>
    <circle cx="512" cy="512" r="180" fill="none" stroke="#FFA500" stroke-width="1.5"/>
  </g>
</svg>
